version: 2

# BRONZE 원천 선언 (순서 7, 2026-07-14 실측: CRM/ERP/AGENCY 전량 적재 완료).
# GA4(BRONZE_GA4.events_YYYYMMDD 샤드)는 ga4_union_shards 매크로가 INFORMATION_SCHEMA 로
# 동적 조회하므로 source() 로 선언하지 않음(설계결정서 §2, 정본 09 STEP 6 주석).
sources:
  - name: bronze_crm
    database: GN_DW
    schema: BRONZE_CRM
    description: "CRM 원천 적재 레이어 — SILVER CRM 21객체의 원천(정본 09 STEP 3)."
    tables:
      - name: TC_CMMN_DTL_CD                # 공통 코드상세 → CRM_CODE
      - name: TM_CM_DEPT_INFO               # 부서(조직) 마스터 → CRM_ORG
      - name: TM_CM_SPNSR_BSNS_INFO         # 후원사업 마스터 → CRM_SPONSORSHIP
      - name: TM_CM_MBER_DVLP_GOAL          # 회원개발 목표 → CRM_DEV_TARGET
      - name: TM_CM_CMPGN_MNG               # 캠페인 관리 → CRM_CAMPAIGN
      - name: TM_CM_BRND_MNG                # 브랜드 관리 (CRM_CAMPAIGN join)
      - name: TM_CM_MKTNG_CMPGN_MNG         # 마케팅 캠페인 (CRM_CAMPAIGN join)
      - name: TM_MM_FDRM_MBER_DVLP_AMT      # 개발약정 실적 → CRM_MEMBER_DEV
      - name: TM_MM_FDRM_MBER_IRSD          # 증액/감액 → CRM_MEMBER_AMT_CHANGE
      - name: TM_MM_FDRM_MBER_SPNSR_DSCNTC  # 후원중단 → CRM_MEMBER_DISCONTINUE
      - name: TM_MM_FDRM_MBER_RE_SPNSR      # 재후원 → CRM_MEMBER_RESPONSOR
      - name: TM_MM_FDRM_MBER_SPNSR_BSNS    # 회원×후원사업 → CRM_MEMBER_SPONSOR_BIZ
      - name: TM_RM_RELATNSP_MSTR_INFO      # 결연(아동) → CRM_SPONSOR_RELATION
      - name: TM_PM_SETLE_INFO              # 결제수단(현재) → CRM_PAYMENT_METHOD
      - name: TM_MS_EVENT                   # 행사 마스터 → CRM_EVENT
      - name: TM_MS_CRMN                    # 캠페인행사 마스터 → CRM_EVENT
      - name: TD_MS_EVENT_PRTCPNT_DTL       # 행사 참여자 상세 → CRM_EVENT_PARTICIPATION
      - name: TD_MS_CRMN_PRTCPNT            # 캠페인행사 참여자 → CRM_EVENT_PARTICIPATION
      - name: TM_RM_RELATNSP_LETTER_INFO    # 결연 서신 → CRM_RELATION_ACTIVITY
      - name: TM_RM_RELATNSP_GFTMNEY_INFO   # 결연 선물금 → CRM_RELATION_ACTIVITY
      - name: TH_MM_FDRM_MBER_STNG_DTLS     # 회원 상태이력(SCD2) → CRM_MEMBER_STATUS_HIST
      - name: TM_PM_MBRFEE_ACMSLT           # 회비 납입/청구 → CRM_PAYMENT_BILLING
      - name: TM_PM_DNTN_DTLS               # 기부금 → CRM_PAYMENT_BILLING
      - name: TM_MM_FDRM_MBER_INFO          # 정기 회원 마스터 → CRM_MEMBER
      - name: TM_MM_ONCE_MBER_INFO          # 일시 회원 마스터 → CRM_MEMBER
      - name: TM_MS_EMAIL_SNDNG             # 이메일 발송 → CRM_SEND_REQUEST
      - name: TM_MS_MSG_AT_SNDNG            # 문자(알림톡) 발송 → CRM_SEND_REQUEST
      - name: TM_MS_PSTMTR_SNDNG            # 우편 발송 → CRM_SEND_REQUEST
      - name: SND_REQ_MST                   # 발송요청 마스터(SND) → CRM_SEND_REQUEST/RESULT
      - name: TD_MS_EMAIL_LQY_SNDNG         # 이메일 성과 → CRM_SEND_RESULT
      - name: TD_MS_MSG_AT_LQY_SNDNG        # 문자 성과 → CRM_SEND_RESULT
      - name: TD_MS_PSTMTR_LQY_SNDNG        # 우편 성과 → CRM_SEND_RESULT
      - name: TD_MS_EMAIL_SNDNG_DTLS        # 이메일 발송 상세 → CRM_SEND_MEMBER
      - name: TD_MS_MSG_AT_SNDNG_DTLS       # 문자 발송 상세 → CRM_SEND_MEMBER
      - name: TD_MS_PSTMTR_SNDNG_DTL        # 우편 발송 상세 → CRM_SEND_MEMBER
      - name: SND_MEMBER_LIST               # 발송 회원 리스트(SND) → CRM_SEND_MEMBER

  - name: bronze_erp
    database: GN_DW
    schema: BRONZE_ERP
    description: "ERP 원천 — 예산 원장(정본 09 STEP 4). TOTAL 요약행 제외, 월 wide→long 언피벗."
    tables:
      - name: BDGT_ACMSLT_LEDGER            # 예산집행 원장 → ERP_BUDGET_ITEM, ERP_BUDGET

  - name: bronze_agency
    database: GN_DW
    schema: BRONZE_AGENCY
    description: "AGENCY 광고대행 원천 3종(정본 09 STEP 5). AGENCY_COST는 GOLD 이관(SILVER 미생성)."
    tables:
      - name: DGT_AD_CMPGN_DTLS             # 디지털 광고 → AGENCY_AD_PERFORMANCE/CREATIVE
      - name: REBRDC_AD_CMPGN_DTLS          # 재방송 광고 → AGENCY_AD_PERFORMANCE/CREATIVE
      - name: VIDEO_AD_CMPGN_DTLS           # 영상 광고 → AGENCY_AD_PERFORMANCE/CREATIVE
