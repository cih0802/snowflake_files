version: 2

# BRONZE_CRM 원천 선언 (§2-3 BRONZE 41 → SILVER 21 매핑 기준)
# loaded_at_field 는 정기/일시 회원만 실적재 상태(2026-07-03). 나머지는 입고 대기.
sources:
  - name: bronze_crm
    database: GN_DW
    schema: BRONZE_CRM
    description: "CRM 원천 적재 레이어. 현재 회원 2개 테이블만 실적재(샘플 각 1,000행)."
    tables:
      # --- 실적재 완료 (ENABLED 모델의 원천) ---
      - name: TM_MM_FDRM_MBER_INFO      # 정기(펀드레이징) 회원 마스터
      - name: TM_MM_ONCE_MBER_INFO      # 일시 회원 마스터

      # --- 입고 대기 (DISABLED 모델의 원천) ---
      - name: TH_MM_FDRM_MBER_STNG_DTLS   # 회원 상태이력 (SCD2)
      - name: TM_MM_FDRM_MBER_DVLP_AMT    # 개발약정 실적
      - name: TM_MM_FDRM_MBER_IRSD        # 증액/감액
      - name: TM_MM_FDRM_MBER_SPNSR_DSCNTC # 후원중단
      - name: TM_MM_FDRM_MBER_RE_SPNSR    # 재후원
      - name: TM_MM_FDRM_MBER_SPNSR_BSNS  # 회원×후원사업
      - name: TM_RM_RELATNSP_MSTR_INFO    # 결연(아동)
      - name: TM_PM_MBRFEE_ACMSLT         # 회비 납입/청구
      - name: TM_PM_DNTN_DTLS             # 기부금
      - name: TM_PM_SETLE_INFO            # 결제수단(현재)
      - name: TH_PM_SETLE_INFO_HIST       # 결제수단 이력
      - name: TM_CM_CMPGN_MNG             # 캠페인 관리
      - name: TM_CM_BRND_MNG              # 브랜드 관리
      - name: TM_CM_MKTNG_CMPGN_MNG       # 마케팅 캠페인
      - name: TM_CM_SPNSR_BSNS_INFO       # 후원사업 마스터
      - name: TM_CM_DEPT_INFO             # 부서(조직) 마스터
      - name: TM_CM_MBER_DVLP_GOAL        # 회원개발 목표
      - name: SND_REQ_MST                 # 발송요청 마스터
      - name: TM_MS_EMAIL_SNDNG           # 이메일 발송
      - name: TM_MS_MSG_AT_SNDNG          # 문자(알림톡) 발송
      - name: TM_MS_PSTMTR_SNDNG          # 우편 발송
      - name: SND_MEMBER_LIST             # 발송 회원 리스트
      - name: TD_MS_EMAIL_SNDNG_DTLS      # 이메일 발송 상세
      - name: TD_MS_MSG_AT_SNDNG_DTLS     # 문자 발송 상세
      - name: TD_MS_PSTMTR_SNDNG_DTL      # 우편 발송 상세
      - name: TD_MS_EMAIL_LQY_SNDNG       # 이메일 성과(오픈/클릭)
      - name: TD_MS_MSG_AT_LQY_SNDNG      # 문자 성과
      - name: TD_MS_PSTMTR_LQY_SNDNG      # 우편 성과
      - name: TM_MS_EVENT                 # 행사 마스터
      - name: TM_MS_CRMN                  # 캠페인행사 마스터
      - name: TD_MS_EVENT_PRTCPNT_DTL     # 행사 참여자 상세
      - name: TD_MS_CRMN_PRTCPNT          # 캠페인행사 참여자
      - name: TM_RM_RELATNSP_LETTER_INFO  # 결연 서신
      - name: TM_RM_RELATNSP_GFTMNEY_INFO # 결연 선물금
      - name: TC_CMMN_CD                  # 공통 코드그룹
      - name: TC_CMMN_DTL_CD              # 공통 코드상세
