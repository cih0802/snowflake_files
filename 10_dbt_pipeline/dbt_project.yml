# GN_DW SILVER dbt 파이프라인 — BRONZE 정제 → SILVER 적재 (순서 7, 정본 09_SILVER_적재쿼리_20260714)
# Co-authored with CoCo
name: 'gn_dw_silver'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
test-paths: ["tests"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# GA4 샤드 범위 var (전기간 입고 후 조정; PoC 기본 = 전범위 UNION).
vars:
  ga4_start: '20000101'
  ga4_end:   '99991231'

# ---------------------------------------------------------------------------
# materialization 방침 (순서 7 확정, 정본 7-E) : INSERT OVERWRITE = full_refresh 동치
#   - 모든 SILVER 모델 = materialized='table' → 매 run 전체 재생성(멱등).
#   - 09_SILVER_적재쿼리_20260714.sql STEP 3~7 의 INSERT OVERWRITE 를 1:1 변환.
#   - DW_LOAD_TS = CURRENT_TIMESTAMP() (재실행 시 갱신) — 프로젝트 관례, 변경 금지(7-E).
#   - GOLD 는 순서 8 대상 → 본 파이프라인에서 비활성(enabled:false, 파일은 보존).
# ---------------------------------------------------------------------------
models:
  gn_dw_silver:
    silver:
      +database: GN_DW
      +schema: SILVER
      +materialized: table
    # GOLD: 순서 8(별도 세션)에서 활성화. 순서 7 가드레일 #3 — GOLD 생성 금지.
    gold:
      +enabled: false
