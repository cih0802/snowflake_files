# GN_DW SILVER dbt 파이프라인 — BRONZE 정제 → SILVER 적재 (순서 7, 정본 09_SILVER_적재쿼리_20260714)
# Co-authored with CoCo
name: 'gn_dw_silver'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
test-paths: ["tests"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# GA4 샤드 범위 var (전기간 입고 후 조정; PoC 기본 = 전범위 UNION).
vars:
  ga4_start: '20000101'
  ga4_end:   '99991231'
  # 순서9: GOLD 날짜차원(DIM_DATE) 고정 연속범위. date_sk 매크로가 이 범위 밖/NULL 을 NULL 로 클램프
  #   → fact 에서 COALESCE(date_sk(...),0) 로 Unknown 멤버(DATE_SK=0) 라우팅. 범위 변경 시 DIM_DATE 도 자동 반영.
  cal_start: '1991-01-01'
  cal_end:   '2035-12-31'

# ---------------------------------------------------------------------------
# materialization 방침
#   - SILVER (순서 8-B 개정): 구조 소유주 = 08_SILVER_테이블DDL. dbt = incremental +
#     pre-hook TRUNCATE + append + full_refresh:false → DDL 구조 보존하며 데이터만 전체 갱신(멱등).
#     (순서 7 의 materialized='table'/INSERT OVERWRITE 를 구조보존형으로 대체.)
#   - DW_LOAD_TS = CURRENT_TIMESTAMP() (재실행 시 갱신) — 프로젝트 관례, 변경 금지(7-E).
#   - GOLD (순서 8): dim=incremental(merge, DDL 보존) / fact=table. 상세는 아래 gold 블록 주석.
# ---------------------------------------------------------------------------
models:
  gn_dw_silver:
    silver:
      +database: GN_DW
      +schema: SILVER
      # 순서 8-B: 구조 소유주 = 04_silver_design/08_SILVER_테이블DDL_20260714.sql (33테이블 선생성).
      #   dbt 는 구조를 덮지 않고 데이터만 갱신 → INSERT OVERWRITE 동치를 구조보존형으로 구현.
      #   전략: incremental + pre-hook TRUNCATE + append + full_refresh:false.
      #     · 매 run: 기존 DDL 테이블 TRUNCATE(제약·주석·구조 보존) 후 전체 SELECT 재적재(append).
      #     · unique_key 불필요 → grain 비유일 모델 행소실 없음. 멱등(재실행 Δ0).
      #     · full_refresh:false → --full-refresh 시에도 CTAS 재생성 차단(DDL 구조 보호).
      #   ⚠️ 전제: 08 DDL 선행 실행(테이블 미존재 시 incremental 첫 run 이 CTAS 로 구조 없이 생성됨).
      +materialized: incremental
      +incremental_strategy: append
      +full_refresh: false
      +pre-hook: "TRUNCATE TABLE IF EXISTS {{ this }}"
    # GOLD: 순서 8 활성화 → 순서 9 개정. 구조는 03_top-down_gold/06_DDL.sql 소유(24테이블 선생성).
    #   - dim  = incremental(merge) + full_refresh:false → DDL 구조·제약·주석 보존, INSERT/UPSERT.
    #   - fact = incremental + append + pre-hook TRUNCATE + full_refresh:false (SILVER 동일 패턴)
    #            → DDL 구조·타입·주석·FK 보존하며 데이터만 전체 갱신(멱등 Δ0). table(CTAS) 폐기.
    #            (table 이 매 run DDL 을 덮어써 타입 소실·fact FK 23개 드롭하던 문제 = 순서9 G-1/G-2 해소.)
    #   - fact grain 비유일(스캐폴드 SK=0)이라 merge 대신 append(unique_key 불요·행소실 없음).
    #   ⚠️ 전제: 06_DDL 선행 실행(테이블 미존재 시 incremental 첫 run 이 CTAS 로 구조 없이 생성됨).
    gold:
      +database: GN_DW
      +schema: GOLD
      +enabled: true
      +full_refresh: false
      fact:
        +materialized: incremental
        +incremental_strategy: append
        +pre-hook: "TRUNCATE TABLE IF EXISTS {{ this }}"
